<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internet Speed Test</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #060b14;
    color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  h1 {
    font-size: 3.2rem;
    font-weight: 900;
    text-align: center;
    margin-bottom: 32px;
    letter-spacing: -1px;
    background: linear-gradient(90deg, #00f2ff, #00e676, #ffea00, #ff1744, #d500f9);
    background-size: 400% 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientMove 7s ease infinite;
    filter: drop-shadow(0 0 16px rgba(0,242,255,0.25));
  }
  @keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .container {
    width:100%;
    max-width: 760px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* Go Button */
  .go-btn {
    width: 170px;
    height: 170px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #00e676, #00c853);
    color: #fff;
    font-size: 3rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 0 50px rgba(0,230,118,0.4), 0 10px 30px rgba(0,0,0,0.5);
    transition: transform .15s ease, box-shadow .2s ease;
    display:flex; align-items:center; justify-content:center;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }
  .go-btn:hover { transform: scale(1.08); box-shadow: 0 0 70px rgba(0,230,118,0.6), 0 14px 36px rgba(0,0,0,0.6); }
  .go-btn:active { transform: scale(0.96); }

  /* Progress */
  .progress-wrap {
    width:100%;
    display:none;
    flex-direction:column;
    gap:8px;
    align-items:center;
    margin-top: 28px;
  }
  .progress-wrap.active { display:flex; }
  .progress-track {
    width:100%; height: 12px; background:#121929; border-radius:999px; overflow:hidden;
    border: 1px solid #1e293b;
  }
  .progress-bar {
    height:100%; width:0%;
    background: linear-gradient(90deg, #00f2ff, #00e676, #ffea00, #ff1744);
    background-size: 300% 100%;
    border-radius:999px;
    transition: width .2s linear;
    box-shadow: 0 0 12px rgba(0,242,255,0.3);
  }
  .progress-text {
    color: #94a3b8;
    font-size: .9rem;
    font-weight: 700;
  }

  /* Gauge */
  .gauge-wrap {
    width: 340px; height: 190px; position:relative; margin-top: 24px;
    display:none; align-items:flex-end; justify-content:center;
  }
  .gauge-wrap.active { display:flex; }
  svg.gauge { width:340px; height:190px; overflow:visible; }
  .gauge-bg { fill:none; stroke:#1e2533; stroke-width:20; stroke-linecap:round; }
  .gauge-fill { fill:none; stroke:url(#gaugeGrad); stroke-width:20; stroke-linecap:round; stroke-dasharray: 440; stroke-dashoffset: 440; transition: stroke-dashoffset .25s linear; filter: drop-shadow(0 0 6px rgba(0,242,255,0.4)); }
  .gauge-center {
    position:absolute; bottom:0; left:50%; transform:translateX(-50%); text-align:center;
  }
  .gauge-mbps {
    font-size: 3rem; font-weight: 900; color:#fff;
    text-shadow: 0 0 20px rgba(255,255,255,0.15);
    letter-spacing: -1px;
  }
  .gauge-label {
    font-size: .9rem; color:#94a3b8; text-transform:uppercase; letter-spacing:1.5px; font-weight: 700; margin-top:4px;
  }

  /* Stats */
  .stats {
    width:100%;
    display:none;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    margin-top: 28px;
  }
  .stats.active { display:grid; }
  .stat-card {
    background: linear-gradient(145deg, #0f172a, #121929);
    border: 1px solid #1e293b;
    border-radius: 18px;
    padding: 24px 16px;
    text-align:center;
    transition: transform .2s, border-color .2s;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  }
  .stat-card:hover { transform: translateY(-3px); border-color: #334155; }
  .stat-icon { width:36px; height:36px; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; }
  .stat-icon svg { width:30px; height:30px; stroke:#94a3b8; fill:none; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }
  .stat-title { font-size:.82rem; text-transform:uppercase; letter-spacing:.8px; margin-bottom:8px; font-weight: 800; }
  .stat-value { font-size: 2rem; font-weight: 900; letter-spacing: -1px; }
  .stat-unit { font-size:.9rem; font-weight: 700; margin-left:3px; opacity:.85; }
  .down-title { color: #00e676; }
  .down-value { color: #00e676; text-shadow: 0 0 14px rgba(0,230,118,0.35); }
  .up-title { color: #ffab00; }
  .up-value { color: #ffab00; text-shadow: 0 0 14px rgba(255,171,0,0.35); }
  .ping-title { color: #00f2ff; }
  .ping-value { color: #00f2ff; text-shadow: 0 0 14px rgba(0,242,255,0.35); }

  /* Info rows */
  .info {
    width:100%;
    display:none;
    flex-direction:column;
    gap:12px;
    margin-top: 20px;
  }
  .info.active { display:flex; }
  .info-row {
    display:flex; align-items:center; gap:12px;
    background: linear-gradient(145deg, #0f172a, #121929);
    border:1px solid #1e293b; border-radius:14px; padding:14px 18px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .info-row svg { width:22px; height:22px; stroke:#60a5fa; fill:none; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; filter: drop-shadow(0 0 4px rgba(96,165,250,0.3)); }
  .info-label { color: #60a5fa; font-size:.88rem; font-weight: 800; }
  .info-value { color: #e2e8f0; font-size:.9rem; margin-left:auto; font-weight: 700; text-align:right; }

  /* Again button */
  .again-btn {
    display:none;
    margin-top: 28px;
    background: linear-gradient(135deg, #1e293b, #273249);
    color: #fff;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 14px 36px;
    font-size: 1.1rem;
    font-weight: 900;
    cursor: pointer;
    transition: transform .15s, box-shadow .2s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .again-btn.active { display:block; }
  .again-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); border-color: #475569; }

  @media (max-width: 600px) {
    h1 { font-size: 2.2rem; }
    .go-btn { width: 140px; height: 140px; font-size: 2.4rem; }
    .gauge-wrap { width: 280px; height: 160px; }
    svg.gauge { width: 280px; height: 160px; }
    .gauge-mbps { font-size: 2.4rem; }
    .stats { grid-template-columns: 1fr; }
    .stat-value { font-size: 1.6rem; }
  }
</style>

<body>

<h1>Internet Speed Test</h1>

<div class="container">

  <button id="goBtn" class="go-btn">GO</button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">Ready</div>
  </div>

  <div class="gauge-wrap" id="gaugeWrap">
    <svg class="gauge" viewbox="0 0 340 190">
      <defs>
        <lineargradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#00f2ff"/>
          <stop offset="35%" stop-color="#00e676"/>
          <stop offset="70%" stop-color="#ffea00"/>

        </linearGradient>
      </defs>
      <path class="gauge-bg" d="M 30 170 A 140 140 0 0 1 310 170"/>

    </svg>
    <div class="gauge-center">
      <div class="gauge-mbps" id="gaugeValue">0.0</div>
      <div class="gauge-label" id="gaugeLabel">Ready</div>
    </div>
  </div>

  <div class="stats" id="stats">
    <div class="stat-card">
      <div class="stat-icon"><svg viewbox="0 0 24 24"><path d="M12 4v12m0 0l-4-4m4 4l4-4M4 12a8 8 0 1 1 16 0"/></svg></div>
      <div class="stat-title down-title">Download</div>
      <div><span class="stat-value down-value" id="downVal">-</span><span class="stat-unit">Mbps</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><svg viewbox="0 0 24 24"><path d="M12 20V8m0 0l-4 4m4-4l4 4M4 12a8 8 0 1 0 16 0"/></svg></div>
      <div class="stat-title up-title">Upload</div>
      <div><span class="stat-value up-value" id="upVal">-</span><span class="stat-unit">Mbps</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon"><svg viewbox="0 0 24 24"><path d="M22 12h-2.5a2.5 2.5 0 0 0-5 0 2.5 2.5 0 0 1-5 0A2.5 2.5 0 0 0 2 12"/><path d="M2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6"/></svg></div>
      <div class="stat-title ping-title">Ping</div>

  <div class="info" id="info">

  <button id="againBtn" class="again-btn">AGAIN</button>

</div>

<script>
(function(){
  const goBtn = document.getElementById('goBtn');
  const againBtn = document.getElementById('againBtn');
  const progressWrap = document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');
  const progressText = document.getElementById('progressText');
  const gaugeWrap = document.getElementById('gaugeWrap');
  const gaugeFill = document.getElementById('gaugeFill');
  const gaugeValue = document.getElementById('gaugeValue');
  const gaugeLabel = document.getElementById('gaugeLabel');
  const stats = document.getElementById('stats');
  const info = document.getElementById('info');
  const downVal = document.getElementById('downVal');
  const upVal = document.getElementById('upVal');
  const pingVal = document.getElementById('pingVal');
  const serverVal = document.getElementById('serverVal');

  let running = false;
  const GAUGE_MAX = 440;

  function setGauge(pct, value, label) {
    const offset = GAUGE_MAX - (GAUGE_MAX * Math.max(0, Math.min(1, pct)));
    gaugeFill.style.strokeDashoffset = offset;
    gaugeValue.textContent = value;
    gaugeLabel.textContent = label;
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  const COLO_MAP = {
    SIN:'Singapore', NRT:'Tokyo', KIX:'Osaka', HKG:'Hong Kong', BKK:'Bangkok', ICN:'Seoul',
    MEL:'Melbourne', SYD:'Sydney', PER:'Perth', AKL:'Auckland',
    LHR:'London', MAN:'Manchester', FRA:'Frankfurt', AMS:'Amsterdam', CDG:'Paris', MAD:'Madrid',
    BCN:'Barcelona', MUC:'Munich', ZRH:'Zurich', ARN:'Stockholm', DUB:'Dublin', VIE:'Vienna',
    JFK:'New York', EWR:'Newark', IAD:'Washington DC', ORD:'Chicago', DFW:'Dallas', MIA:'Miami',
    SEA:'Seattle', SJC:'San Jose', LAX:'Los Angeles', SFO:'San Francisco', DEN:'Denver', ATL:'Atlanta',
    YVR:'Vancouver', YYZ:'Toronto', YUL:'Montreal',
    BOM:'Mumbai', DEL:'Delhi', BLR:'Bangalore', MAA:'Chennai', HYD:'Hyderabad', CCU:'Kolkata',
    DXB:'Dubai', AUH:'Abu Dhabi', DOH:'Doha', JNB:'Johannesburg', CPT:'Cape Town',
    GRU:'São Paulo', GIG:'Rio de Janeiro', EZE:'Buenos Aires', SCL:'Santiago', MEX:'Mexico City',
    CGK:'Jakarta', KUL:'Kuala Lumpur', MNL:'Manila', TPE:'Taipei', SHA:'Shanghai', BJS:'Beijing',
    HAN:'Hanoi', SGN:'Ho Chi Minh City', RGN:'Yangon', DAC:'Dhaka', KHI:'Karachi', ISB:'Islamabad'
  };

  async function getServerInfo() {
    const urls = ['https://1.1.1.1/cdn-cgi/trace', 'https://www.cloudflare.com/cdn-cgi/trace'];
    for (const url of urls) {
      try {
        const res = await fetch(url, {cache:'no-store'});
        if (!res.ok) continue;
        const text = await res.text();
        const colo = text.match(/colo=([A-Z0-9]+)/)?.[1];
        const loc = text.match(/loc=([A-Z]+)/)?.[1];
        if (colo) {
          const city = COLO_MAP[colo] || colo;
          return { city, country: loc || '', colo };
        }
      } catch(e) { continue; }
    }
    return { city:'Global Network', country:'', colo:'' };
  }

  async function testPing(onUpdate) {
    const pingUrls = [
      'https://www.google.com/generate_204',
      'https://www.cloudflare.com/cdn-cgi/trace',
      'https://httpbin.org/get'
    ];
    let samples = [];
    for (const base of pingUrls) {
      if (samples.length > 0) break;
      try { await fetch(base, {mode:'no-cors', cache:'no-store'}); } catch(e){}
      await sleep(250);
      for (let i=0; i<5; i++) {
        const start = performance.now();
        try {
          await fetch(base + '?cb=' + Math.random() + '&i=' + i, {mode:'no-cors', cache:'no-store'});
        } catch(e) { continue; }
        const ms = Math.round(performance.now() - start);
        samples.push(ms);
        onUpdate(ms);
        await sleep(180);
      }
    }
    if (!samples.length) return null;
    samples.sort((a,b)=>a-b);
    return samples[Math.floor(samples.length/2)];
  }

  async function testDownloadRealtime(onUpdate) {
    const endpoints = [
      { url: 'https://speed.cloudflare.com/__down?bytes=10000000&r='+Math.random(), size: 10000000 },
      { url: 'https://httpbin.org/bytes/5000000?r='+Math.random(), size: 5000000 }
    ];
    for (const ep of endpoints) {
      try {
        const controller = new AbortController();
        const tO = setTimeout(()=>controller.abort(), 15000);
        const start = performance.now();
        const res = await fetch(ep.url, { signal: controller.signal });
        clearTimeout(tO);
        if (!res.ok) throw new Error('HTTP '+res.status);
        const reader = res.body.getReader();
        let received = 0;
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          if (value) received += value.length;
          const secs = (performance.now() - start) / 1000;
          if (secs > 0) {
            const mbps = (received * 8) / secs / 1e6;
            onUpdate(mbps, ep.size ? received / ep.size : Math.min(secs/12, 0.95));
          }
          if (secs > 12) { reader.cancel(); break; }
        }
        const totalSecs = (performance.now() - start) / 1000 || 0.001;
        return (received * 8) / totalSecs / 1e6;
      } catch(e) {
        console.warn('Download endpoint failed:', e);
        continue;
      }
    }
    throw new Error('Download failed');
  }

  function makePayload(sizeBytes) {
    const buf = new Uint8Array(sizeBytes);
    for (let i = 0; i < sizeBytes; i++) buf[i] = (i * 7 + 13) & 0xFF;
    return buf;
  }

  async function testUploadRealtime(onUpdate) {
    // Helper: run XHR upload and measure ONLY upload time via xhr.upload events
    const runXHR = (url, sizeBytes) => new Promise((resolve, reject) => {
      const payload = makePayload(sizeBytes);
      const xhr = new XMLHttpRequest();
      xhr.open('POST', url + '?r=' + Math.random(), true);
      xhr.timeout = 35000;

      const start = performance.now();
      let lastTime = start;
      let lastLoaded = 0;

      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable && e.total > 0) {
          const now = performance.now();
          const dt = (now - lastTime) / 1000;
          if (dt > 0.08 && e.loaded > lastLoaded) {
            const bits = (e.loaded - lastLoaded) * 8;
            const mbps = bits / dt / 1e6;
            onUpdate(mbps, e.loaded / e.total);
            lastTime = now;
            lastLoaded = e.loaded;
          }
        }
      };

      xhr.upload.onload = () => {
        // Upload fully sent to the network stack
        const end = performance.now();
        const secs = (end - start) / 1000 || 0.001;
        const mbps = (sizeBytes * 8) / secs / 1e6;
        onUpdate(mbps, 1.0);
        resolve(mbps);
      };

      xhr.upload.onerror = () => reject(new Error('Upload transfer error'));
      xhr.upload.ontimeout = () => reject(new Error('Upload timeout'));
      xhr.onerror = () => reject(new Error('XHR error'));
      xhr.ontimeout = () => reject(new Error('XHR timeout'));

      xhr.send(new Blob([payload], {type:'application/octet-stream'}));
    });

    // Primary: Cloudflare __up (designed for speed tests, no echo bloat)
    try {
      return await runXHR('https://speed.cloudflare.com/__up', 4 * 1024 * 1024);
    } catch(e) { console.warn('Cloudflare upload failed:', e); }

    // Fallback: httpbin with 2 MB (accepts POST but echoes response; upload.onload isolates upload time)
    try {
      return await runXHR('https://httpbin.org/post', 2 * 1024 * 1024);
    } catch(e) { console.warn('httpbin upload failed:', e); }

    // Fallback: httpbin with 1 MB
    try {
      return await runXHR('https://httpbin.org/post', 1 * 1024 * 1024);
    } catch(e) { console.warn('httpbin small upload failed:', e); }

    throw new Error('Upload failed');
  }

  async function runTest() {
    if (running) return;
    running = true;
    goBtn.style.display = 'none';
    againBtn.classList.remove('active');
    progressWrap.classList.add('active');
    gaugeWrap.classList.add('active');
    stats.classList.add('active');
    info.classList.add('active');

    setGauge(0, '0.0', 'Initializing...');
    progressBar.style.width = '0%';
    progressText.textContent = 'Initializing...';
    downVal.textContent = '-'; upVal.textContent = '-'; pingVal.textContent = '-';

    // Server info detection
    progressText.textContent = 'Detecting server...';
    progressBar.style.width = '15%';
    const server = await getServerInfo();
    serverVal.textContent = (server.city !== 'Global Network')
      ? `${server.city}${server.country ? ', ' + server.country : ''}`
      : server.city;
    progressBar.style.width = '25%';

    // Ping
    progressText.textContent = 'Testing ping...';
    gaugeLabel.textContent = 'Ping ms';
    setGauge(0, '...', 'Ping ms');
    const ping = await testPing((latest) => {
      pingVal.textContent = latest;
      setGauge(0, latest.toString(), 'Ping ms');
    });
    if (ping != null) {
      pingVal.textContent = ping;
      setGauge(0, ping.toString(), 'Ping ms');
    } else {
      pingVal.textContent = 'Error';
      setGauge(0, 'Err', 'Ping ms');
    }
    progressBar.style.width = '35%';
    await sleep(300);

    // Download
    progressText.textContent = 'Testing download speed...';
    gaugeLabel.textContent = 'Download Mbps';
    setGauge(0, '0.0', 'Download Mbps');
    let downResult = 0;
    try {
      downResult = await testDownloadRealtime((mbps, pct) => {
        setGauge(Math.min(mbps/1000, 1), mbps.toFixed(1), 'Download Mbps');
        progressBar.style.width = (35 + pct * 30) + '%';
      });
    } catch(e) {
      downVal.textContent = 'Error';
      setGauge(0, 'Err', 'Download Mbps');
    }
    if (downResult) {
      downVal.textContent = downResult.toFixed(1);
      setGauge(Math.min(downResult/1000, 1), downResult.toFixed(1), 'Download Mbps');
    }
    progressBar.style.width = '65%';
    await sleep(300);

    // Upload
    progressText.textContent = 'Testing upload speed...';
    gaugeLabel.textContent = 'Upload Mbps';
    setGauge(0, '0.0', 'Upload Mbps');
    let upResult = 0;
    try {
      upResult = await testUploadRealtime((mbps, pct) => {
        setGauge(Math.min(mbps/500, 1), mbps.toFixed(1), 'Upload Mbps');
        progressBar.style.width = (65 + pct * 35) + '%';
      });
    } catch(e) {
      upVal.textContent = 'Error';
      setGauge(0, 'Err', 'Upload Mbps');
    }
    if (upResult) {
      upVal.textContent = upResult.toFixed(1);
      setGauge(Math.min(upResult/500, 1), upResult.toFixed(1), 'Upload Mbps');
    }

    progressBar.style.width = '100%';
    progressText.textContent = 'Test complete';
    againBtn.classList.add('active');
    running = false;
  }

  function reset() {
    goBtn.style.display = 'flex';
    againBtn.classList.remove('active');
    progressWrap.classList.remove('active');
    gaugeWrap.classList.remove('active');
    stats.classList.remove('active');
    info.classList.remove('active');
    progressBar.style.width = '0%';
    setGauge(0, '0.0', 'Ready');
    downVal.textContent = '-'; upVal.textContent = '-'; pingVal.textContent = '-';
    serverVal.textContent = 'Detecting...';
    running = false;
  }

  goBtn.addEventListener('click', runTest);
  againBtn.addEventListener('click', reset);
})();
