<title>Download Speed Test</title>
<style>
  :root {
    --bg: #0b0f17;
    --panel: #141a26;
    --panel2: #1b2333;
    --accent: #2dd4bf;
    --accent2: #38bdf8;
    --accent3: #a78bfa;
    --text: #e6edf3;
    --muted: #8b9bb4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(167,139,250,.18), transparent 60%),
      radial-gradient(900px 500px at 10% 110%, rgba(45,212,191,.16), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    position: relative;
    background: linear-gradient(160deg, var(--panel), var(--panel2));
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 24px;
    padding: 44px 36px 36px;
    width: 100%;
    max-width: 460px;
    text-align: center;
    box-shadow: 0 24px 70px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.05);
  }
  .card::before {
    content: "";
    position: absolute; inset: 0;
    border-radius: 24px;
    padding: 1px;
    background: linear-gradient(135deg, rgba(45,212,191,.5), rgba(56,189,248,.2), rgba(167,139,250,.5));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
    opacity: .6;
  }
  h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: .3px;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #2dd4bf, #38bdf8, #a78bfa);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .sub { color: var(--muted); font-size: 1.05rem; margin-bottom: 34px; }

  .ipbar {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 999px;
    padding: 9px 18px;
    font-size: 1rem;
    font-weight: 600;
  }
  .chip .label { color: var(--muted); font-weight: 500; }
  .chip .ip { color: #22c55e; }
  .chip .country { color: var(--accent); }


  .readout { margin: 10px 0 6px; }
  .value {
    font-size: 5.6rem;
    font-weight: 800;
    line-height: 1;
    background: linear-gradient(90deg, #f59e0b, #f97316, #22c55e);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 30px rgba(34,197,94,.18);
  }
  .unit { color: var(--accent); font-size: 1.15rem; margin-top: 10px; letter-spacing: 4px; font-weight: 600; text-transform: uppercase; }

  .status {
    font-size: 1.05rem; min-height: 22px; margin: 28px 0 22px; font-weight: 500;
    color: var(--accent2);
  }

  button {
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
    background-size: 200% auto;
    color: #06231f;
    border: none;
    padding: 16px 52px;
    font-size: 1.2rem;
    font-weight: 800;
    letter-spacing: .4px;
    border-radius: 999px;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s, opacity .15s, background-position .4s;
    box-shadow: 0 8px 26px rgba(45,212,191,.3);
  }
  button:hover:not(:disabled) { transform: translateY(-2px); background-position: right center; box-shadow: 0 12px 32px rgba(167,139,250,.35); }
  button:active:not(:disabled) { transform: translateY(0); }
  button:disabled { opacity: .55; cursor: default; }

  footer {
    margin-top: 24px;
    color: var(--muted);
    font-size: .95rem;
    letter-spacing: .3px;
  }
  footer .name {
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
  }
</style>

<body>
  <div class="card">
    <h1>Download Speed Test</h1>
    <div class="sub">Measure your current download speed</div>

    <div class="ipbar">
      <span class="chip"><span class="label">IP</span> <span class="ip" id="ip">Loading…</span></span>
      <span class="chip"><span class="country" id="country">📍 …</span></span>
    </div>

    <div class="readout">
      <div class="value" id="value">0</div>
      <div class="unit">Mbps</div>
    </div>

    <div class="status" id="status">Ready to test</div>
    <button id="startBtn">Start Test</button>

    <footer>© <span class="name">Bappa Ghosh</span>. All rights reserved.</footer>
  </div>

<script>
  const valueEl = document.getElementById('value');
  const statusEl = document.getElementById('status');
  const btn = document.getElementById('startBtn');
  const ipEl = document.getElementById('ip');
  const countryEl = document.getElementById('country');

  // Multiple providers tried in order — each returns {ip, country, code}.
  const IP_PROVIDERS = [
    async () => {
      const d = await (await fetch('https://get.geojs.io/v1/ip/geo.json')).json();
      return { ip: d.ip, country: d.country, code: d.country_code };
    },
    async () => {
      const d = await (await fetch('https://api.country.is/')).json();
      return { ip: d.ip, country: '', code: d.country };
    },
    async () => {
      const ip = (await (await fetch('https://get.geojs.io/v1/ip.json')).json()).ip;
      return { ip: ip, country: '', code: '' };
    }
  ];

  async function loadIPInfo() {
    for (const provider of IP_PROVIDERS) {
      try {
        const info = await provider();
        if (!info.ip) throw new Error('no ip');
        ipEl.textContent = info.ip;
        const name = info.country || countryName(info.code);
        if (name || info.code) {
          countryEl.textContent = `${countryFlag(info.code)} ${name || info.code}`;
        } else {
          countryEl.textContent = '📍 Location unavailable';
        }
        return;
      } catch (e) { /* try next */ }
    }
    ipEl.textContent = 'Unavailable';
    countryEl.textContent = '📍 Unknown';
  }

  // Convert a 2-letter country code into a flag emoji.
  function countryFlag(code) {
    if (!code || code.length !== 2) return '📍';
    return code.toUpperCase().replace(/./g, c =>
      String.fromCodePoint(127397 + c.charCodeAt(0)));
  }

  // Resolve a 2-letter code to a full country name using the browser.
  function countryName(code) {
    if (!code || code.length !== 2) return '';
    try {
      const dn = new Intl.DisplayNames(['en'], { type: 'region' });
      return dn.of(code.toUpperCase()) || '';
    } catch (e) { return ''; }
  }

  loadIPInfo();

  function show(mbps) {
    valueEl.textContent = mbps >= 100 ? Math.round(mbps) : mbps.toFixed(1);
  }

  const TEST_FILES = [
    "https://speed.cloudflare.com/__down?bytes=25000000",
    "https://proof.ovh.net/files/10Mb.dat"
  ];

  async function runTest() {
    btn.disabled = true;
    show(0);
    valueEl.textContent = "0";
    statusEl.textContent = "Connecting…";

    let success = false;
    for (const base of TEST_FILES) {
      const url = base + (base.includes('?') ? '&' : '?') + 'cacheBust=' + Date.now();
      try { await measure(url); success = true; break; } catch (e) {}
    }

    if (!success) statusEl.textContent = "Test failed — check your connection and try again.";
    btn.disabled = false;
  }

  async function measure(url) {
    const start = performance.now();
    const resp = await fetch(url, { cache: "no-store" });
    if (!resp.ok || !resp.body) throw new Error("bad response");

    const reader = resp.body.getReader();
    let received = 0;
    statusEl.textContent = "Testing download speed…";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      received += value.length;
      const elapsed = (performance.now() - start) / 1000;
      if (elapsed > 0.15) show((received * 8) / elapsed / 1e6);
    }

    const totalElapsed = (performance.now() - start) / 1000;
    const finalMbps = (received * 8) / totalElapsed / 1e6;
    show(finalMbps);
    statusEl.textContent = `Done · ${(received/1e6).toFixed(1)} MB in ${totalElapsed.toFixed(1)} s`;
  }

  btn.addEventListener('click', runTest);
</script>
</body>
